<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldsocho - Coming Soon</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: gold;
            letter-spacing: 2px;
        }

        .tagline {
            margin-top: 10px;
            font-size: 16px;
            color: #ccc;
            letter-spacing: 3px;
        }

        .coming-soon {
            margin-top: 30px;
            font-size: 36px;
            font-weight: 300;
        }

        .description {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }

        .email-box {
            margin-top: 30px;
        }

        input[type="email"] {
            padding: 12px;
            width: 250px;
            border: none;
            outline: none;
            border-radius: 5px;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            background: gold;
            color: black;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ffd700;
        }

        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Goldsocho</div>
        <div class="tagline">Jewellery Brand</div>

        <div class="coming-soon">Coming Soon</div>

        <div class="description">
            A new era of elegance and timeless jewellery is arriving soon.
        </div>

        <div class="email-box">
            <input type="email" placeholder="Enter your email">
            <button>Notify Me</button>
        </div>

        <footer>
            © 2026 Goldsocho. All rights reserved.
        </footer>
    </div>

</body>
</html>
